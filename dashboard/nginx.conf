# nginx config for the production frontend image (Dockerfile.prod).
# Mirrors the Vite dev proxy exactly: /api, /videos, /thumbnails and /fonts are
# forwarded to the backend container; everything else is the built SPA.

server {
    listen 5175;
    server_name _;

    # Uploads go through /api/process|/api/batch; backend enforces its own
    # MAX_FILE_SIZE_MB (default 2048) — nginx just has to not reject first.
    client_max_body_size 2200m;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are immutable; index.html must revalidate so a new
    # deploy is picked up immediately.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/(api|videos|thumbnails|fonts)/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # $proxy_add_x_forwarded_for APPENDS $remote_addr to any incoming
        # X-Forwarded-For instead of overwriting it. That is safe here
        # because the backend (security.client_ip) reads the LAST hop — the
        # value this proxy wrote — so a client-forged prefix is ignored.
        # Keep append+last-hop in sync: if you switch this to $remote_addr
        # (overwrite) nothing changes; a forged prefix only becomes
        # dangerous if the backend ever goes back to reading the first hop.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Compose/publish passes can legitimately run for minutes; match the
        # backend's CLIPPYME_FFMPEG_TIMEOUT ceiling (600s) so nginx doesn't
        # 504 a render the backend is still happily finishing.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        # Stream uploads and video responses instead of spooling them to disk.
        proxy_request_buffering off;
        proxy_buffering off;
    }
}
