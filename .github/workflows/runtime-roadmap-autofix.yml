name: Runtime roadmap one-time compatibility fix

on:
  push:
    branches: ["codex/runtime-quality-roadmap-20260724"]

permissions:
  contents: write

concurrency:
  group: runtime-roadmap-autofix
  cancel-in-progress: false

jobs:
  compatibility-fixes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch orchestrator compatibility details
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/clippyme/pipeline/orchestrator.py')
          text = path.read_text(encoding='utf-8')

          source_cleanup = '''    for path in Path(output_dir).glob("source_*.mp4"):
              try:
                  path.unlink()
              except OSError:
                  pass
          try:
              shutil.rmtree(state.checkpoint_dir)
          '''
          safe_cleanup = '''    # Preserve source_<clip>.mp4 permanently: POST /api/reframe uses
              # those slices to change framing without downloading/transcribing again.
              # Only the hidden duplicate transcript/checkpoint cache is disposable.
              try:
                  shutil.rmtree(state.checkpoint_dir)
          '''
          text = text.replace(source_cleanup, safe_cleanup, 1)

          uncapped = '''    shorts = clips_data.get("shorts") or []

              if shorts and not args.skip_analysis:
          '''
          capped = '''    shorts = clips_data.get("shorts") or []
              max_clips = _max_clips_from_env()
              if max_clips and len(shorts) > max_clips:
                  print(
                      f"✂️ CLIPPYME_MAX_CLIPS={max_clips}: keeping the highest-ranked "
                      f"{max_clips} of {len(shorts)} candidates",
                      flush=True,
                  )
                  shorts = shorts[:max_clips]
                  clips_data["shorts"] = shorts

              if shorts and not args.skip_analysis:
          '''
          text = text.replace(uncapped, capped, 1)

          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit fixes when needed
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/clippyme/pipeline/orchestrator.py
          git commit -m "fix(pipeline): preserve reframe sources and enforce clip cap"
          git push origin HEAD:codex/runtime-quality-roadmap-20260724
