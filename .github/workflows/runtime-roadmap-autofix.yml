name: Runtime roadmap one-time compatibility fix

on:
  push:
    branches: ["codex/runtime-quality-roadmap-20260724"]

permissions:
  contents: write

concurrency:
  group: runtime-roadmap-autofix
  cancel-in-progress: false

jobs:
  compatibility-fixes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply audited compatibility fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          orchestrator = Path('src/clippyme/pipeline/orchestrator.py')
          text = orchestrator.read_text(encoding='utf-8')
          unsafe_cleanup = "\n".join([
              '    for path in Path(output_dir).glob("source_*.mp4"):',
              '        try:',
              '            path.unlink()',
              '        except OSError:',
              '            pass',
          ]) + "\n"
          safe_comment = "\n".join([
              '    # Preserve source_<clip>.mp4: POST /api/reframe needs these slices',
              '    # to change framing without downloading/transcribing again.',
          ]) + "\n"
          if unsafe_cleanup in text:
              orchestrator.write_text(text.replace(unsafe_cleanup, safe_comment, 1), encoding='utf-8')
          elif 'for path in Path(output_dir).glob("source_*.mp4")' in text:
              raise SystemExit('source-slice cleanup exists but did not match the audited block')

          runner = Path('src/clippyme/domain/job_runner.py')
          text = runner.read_text(encoding='utf-8')
          old_loop = "\n".join([
              '            for attempt in range(1, max_attempts + 1):',
              '                status = jobs[job_id].get("status")',
          ])
          new_loop = "\n".join([
              '            try:',
              '                completed_attempts = max(0, int(job_data.get("attempt") or 0))',
              '            except (TypeError, ValueError):',
              '                completed_attempts = 0',
              '            first_attempt = completed_attempts + 1',
              '            if first_attempt > max_attempts:',
              '                jobs[job_id]["status"] = "failed"',
              '                jobs[job_id]["logs"].append(',
              '                    "Retry budget already exhausted before dispatch."',
              '                )',
              '                _notify()',
              '                return',
              '',
              '            for attempt in range(first_attempt, max_attempts + 1):',
              '                status = jobs[job_id].get("status")',
          ])
          if old_loop in text:
              text = text.replace(old_loop, new_loop, 1)
          elif 'for attempt in range(1, max_attempts + 1):' in text:
              raise SystemExit('retry loop exists but did not match the audited block')
          old_max = '''                max_attempts = max(1, int(
                      job_data.get("max_attempts")
                      or env.get("CLIPPYME_JOB_MAX_ATTEMPTS")
                      or os.environ.get("CLIPPYME_JOB_MAX_ATTEMPTS", "3")
                  ))'''
          new_max = '''                max_attempts = min(10, max(1, int(
                      job_data.get("max_attempts")
                      or env.get("CLIPPYME_JOB_MAX_ATTEMPTS")
                      or os.environ.get("CLIPPYME_JOB_MAX_ATTEMPTS", "3")
                  )))'''
          if old_max in text:
              text = text.replace(old_max, new_max, 1)
          elif 'max_attempts = max(1, int(' in text:
              raise SystemExit('runner max-attempts block did not match the audited form')
          runner.write_text(text, encoding='utf-8')

          journal = Path('src/clippyme/domain/job_journal.py')
          text = journal.read_text(encoding='utf-8')
          old_positive = '''def _positive_int(value, default: int) -> int:
              try:
                  return max(1, int(value))
              except (TypeError, ValueError):
                  return max(1, int(default))'''
          new_positive = '''def _positive_int(value, default: int) -> int:
              try:
                  parsed = int(value)
              except (TypeError, ValueError):
                  try:
                      parsed = int(default)
                  except (TypeError, ValueError):
                      parsed = 3
              return min(10, max(1, parsed))'''
          if old_positive in text:
              text = text.replace(old_positive, new_positive, 1)
          elif 'def _positive_int(value, default: int) -> int:' in text and 'return min(10, max(1, parsed))' not in text:
              raise SystemExit('journal positive-int block did not match the audited form')
          journal.write_text(text, encoding='utf-8')
          PY
      - name: Commit fixes when needed
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/clippyme/pipeline/orchestrator.py src/clippyme/domain/job_runner.py src/clippyme/domain/job_journal.py
          git commit -m "fix(runtime): enforce bounded global retry budget"
          git push origin HEAD:codex/runtime-quality-roadmap-20260724
