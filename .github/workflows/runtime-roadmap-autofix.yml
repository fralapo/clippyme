name: Runtime roadmap one-time compatibility fix

on:
  push:
    branches: ["codex/runtime-quality-roadmap-20260724"]

permissions:
  contents: write

concurrency:
  group: runtime-roadmap-autofix
  cancel-in-progress: false

jobs:
  compatibility-fixes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Preserve post-hoc reframe source slices
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/clippyme/pipeline/orchestrator.py')
          text = path.read_text(encoding='utf-8')
          old = "\n".join([
              '    for path in Path(output_dir).glob("source_*.mp4"):',
              '        try:',
              '            path.unlink()',
              '        except OSError:',
              '            pass',
          ]) + "\n"
          new = "\n".join([
              '    # Preserve source_<clip>.mp4: POST /api/reframe needs these slices',
              '    # to change framing without downloading/transcribing again.',
          ]) + "\n"
          if old in text:
              text = text.replace(old, new, 1)
              path.write_text(text, encoding='utf-8')
          elif 'for path in Path(output_dir).glob("source_*.mp4")' in text:
              raise SystemExit('source-slice cleanup exists but did not match the audited block')
          else:
              print('Source slices are already preserved.')
          PY
      - name: Commit fix when needed
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/clippyme/pipeline/orchestrator.py
          git commit -m "fix(pipeline): preserve source slices for reframe"
          git push origin HEAD:codex/runtime-quality-roadmap-20260724
