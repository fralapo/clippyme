name: Runtime roadmap one-time compatibility fix

on:
  push:
    branches: ["codex/runtime-quality-roadmap-20260724"]

permissions:
  contents: write

concurrency:
  group: runtime-roadmap-autofix
  cancel-in-progress: false

jobs:
  preserve-source-slices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Remove unsafe source-slice cleanup
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/clippyme/pipeline/orchestrator.py')
          text = path.read_text(encoding='utf-8')
          old = '''    for path in Path(output_dir).glob("source_*.mp4"):
              try:
                  path.unlink()
              except OSError:
                  pass
          try:
              shutil.rmtree(state.checkpoint_dir)
          '''
          new = '''    # Preserve source_<clip>.mp4 permanently: POST /api/reframe uses
              # those slices to change framing without downloading/transcribing again.
              # Only the hidden duplicate transcript/checkpoint cache is disposable.
              try:
                  shutil.rmtree(state.checkpoint_dir)
          '''
          if old not in text:
              print('Compatibility block already fixed; nothing to commit.')
          else:
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit fix when needed
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/clippyme/pipeline/orchestrator.py
          git commit -m "fix(pipeline): preserve source slices for reframe"
          git push origin HEAD:codex/runtime-quality-roadmap-20260724
