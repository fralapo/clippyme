name: Runtime roadmap verification

on:
  push:
    branches: ["codex/runtime-quality-roadmap-20260724"]

permissions:
  contents: read
  statuses: write

concurrency:
  group: runtime-roadmap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend and security
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[host-tests]"
          pip install pytest pytest-cov pip-audit ruff bandit
      - name: Compile
        run: python -m compileall -q src tests
      - name: Ruff bug-class lint
        run: ruff check src/clippyme tests --select E9,F63,F7,F82
      - name: Bandit medium/high
        run: bandit -q -r src/clippyme -ll -ii
      - name: Host tests
        run: pytest -m "not integration" -q
      - name: Core dependency audit
        run: >-
          pip-audit -r requirements.lock --desc
          --ignore-vuln CVE-2025-3000
          --ignore-vuln CVE-2026-24049
          --ignore-vuln PYSEC-2026-1805
          --ignore-vuln PYSEC-2026-2132
          --ignore-vuln PYSEC-2026-3447
      - name: Runtime tools audit
        run: pip-audit -r requirements-runtime-tools.txt --desc
      - name: Publish backend status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const ok = '${{ job.status }}' === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: ok ? 'success' : 'failure',
              context: 'runtime-roadmap/backend',
              description: ok ? 'Backend, tests, lint, security and audits passed' : 'Backend verification failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

  frontend:
    name: Frontend and dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test -- --coverage
      - name: Build
        run: npm run build
      - name: Dependency audit
        run: npm audit --package-lock-only --audit-level=high
      - name: Publish frontend status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const ok = '${{ job.status }}' === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: ok ? 'success' : 'failure',
              context: 'runtime-roadmap/frontend',
              description: ok ? 'Frontend lint, tests, build and audit passed' : 'Frontend verification failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

  integration:
    name: Docker pipeline integration
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: clippyme-backend:latest
          build-args: |
            GPU_RUNTIME=cpu
            ENABLE_WHISPER_DIARIZE=0
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run integration suite
        run: docker compose run --rm -u root backend sh -lc "pip install -q pytest && pytest -m integration -q"
      - name: Publish integration status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const ok = '${{ job.status }}' === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: ok ? 'success' : 'failure',
              context: 'runtime-roadmap/integration',
              description: ok ? 'Docker build and pipeline integration passed' : 'Docker integration verification failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
