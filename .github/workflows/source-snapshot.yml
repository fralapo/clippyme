name: Source snapshot

on:
  push:
    branches: ["audit/round2-2026-07-23"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Build source archive
        run: |
          tar --exclude=.git --exclude=node_modules --exclude=dashboard/node_modules -czf /tmp/clippyme-source.tar.gz .
      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: clippyme-source-snapshot
          path: /tmp/clippyme-source.tar.gz
          if-no-files-found: error
          retention-days: 1
