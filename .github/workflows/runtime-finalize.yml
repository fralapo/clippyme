name: Runtime roadmap final one-time patch

on:
  push:
    branches: ["codex/runtime-quality-roadmap-20260724"]

permissions:
  contents: write

concurrency:
  group: runtime-roadmap-finalize
  cancel-in-progress: false

jobs:
  prune-stale-identities:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch tracker and regression test
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('src/clippyme/pipeline/reframe_track.py')
          text = source.read_text(encoding='utf-8')
          old = '''    def get_target(self, face_candidates, frame_number, width):
              if not face_candidates:
                  return None
          '''
          new = '''    def get_target(self, face_candidates, frame_number, width):
              # Remove expired identities before every matching pass. Merely skipping
              # them in `_match_identity` makes the search cost grow throughout long
              # streams with intermittent or false-positive face detections.
              self.known_faces = [
                  known
                  for known in self.known_faces
                  if frame_number - known["last_frame"] <= 30
              ]
              if not face_candidates:
                  return None
          '''
          if old in text:
              source.write_text(text.replace(old, new, 1), encoding='utf-8')
          elif 'Remove expired identities before every matching pass' not in text:
              raise SystemExit('tracker target block did not match audited source')

          tests = Path('tests/pipeline/test_reframe_subject_tracking.py')
          text = tests.read_text(encoding='utf-8')
          marker = 'def test_stale_face_identities_are_pruned_on_long_streams'
          if marker not in text:
              text += '''\n\ndef test_stale_face_identities_are_pruned_on_long_streams(monkeypatch):
              monkeypatch.setenv("REFRAME_DIALOGUE_GROUP", "0")
              tracker = SpeakerTracker(cooldown_frames=1)
              tracker.known_faces = [
                  {"id": index, "box": [index, 0, 10, 10], "last_frame": 0}
                  for index in range(500)
              ]
              tracker.get_target([], 31, 1920)
              assert tracker.known_faces == []
          '''
              tests.write_text(text, encoding='utf-8')
          PY
      - name: Commit patch when needed
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/clippyme/pipeline/reframe_track.py tests/pipeline/test_reframe_subject_tracking.py
          git commit -m "fix(reframe): prune expired identities on long videos"
          git push origin HEAD:codex/runtime-quality-roadmap-20260724
