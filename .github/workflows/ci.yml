name: CI

# Host tests, dependency audits and frontend verification run on every push/PR.
# The Docker integration suite also runs on PRs so CV/ML regressions are caught
# before merge rather than only after they reach main.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest + pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package (editable) + host-test deps + audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[host-tests]"
          pip install pytest pytest-cov pip-audit ruff

      - name: Lint (ruff — bug-class rules)
        run: ruff check src/clippyme tests --select E9,F63,F7,F82

      - name: Run host test suite (excludes integration)
        id: host-tests
        continue-on-error: true
        run: >-
          pytest -m "not integration" -q
          --cov=clippyme --cov-report=term
          --junitxml=pytest-report.xml

      - name: Upload backend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-pytest-report
          path: pytest-report.xml
          if-no-files-found: error
          retention-days: 7

      - name: Dependency vulnerability scan (core pinned tree)
        run: >-
          pip-audit -r requirements.lock --desc
          --ignore-vuln CVE-2025-3000
          --ignore-vuln CVE-2026-24049
          --ignore-vuln PYSEC-2026-1805
          --ignore-vuln PYSEC-2026-2132
          --ignore-vuln PYSEC-2026-3447

      - name: Dependency vulnerability scan (runtime tools)
        run: pip-audit -r requirements-runtime-tools.txt --desc

      - name: Enforce backend test result
        if: steps.host-tests.outcome != 'success'
        run: exit 1

  frontend-audit:
    name: Frontend production dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Generate production audit report
        id: audit
        shell: bash
        run: |
          set +e
          npm audit --package-lock-only --omit=dev --audit-level=high --json > npm-audit.json
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload production audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-production-audit
          path: dashboard/npm-audit.json
          if-no-files-found: error
          retention-days: 7

      - name: Enforce production audit
        if: steps.audit.outputs.exit_code != '0'
        run: |
          node -e "const r=require('./npm-audit.json'); for (const [n,v] of Object.entries(r.vulnerabilities||{})) console.error(n, v.severity, v.via);"
          exit 1

  frontend:
    name: Frontend (test + build + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --coverage

      - name: Build
        run: npm run build

  integration:
    name: Integration (Docker — reframe/pipeline)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image (GHA layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: clippyme-backend:latest
          build-args: |
            GPU_RUNTIME=cpu
            ENABLE_WHISPER_DIARIZE=0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run integration suite in the backend image
        run: docker compose run --rm -u root backend sh -lc "pip install -q pytest && pytest -m integration -q"

  round2-diagnostics:
    name: Round 2 static diagnostics
    if: github.event_name == 'pull_request' && github.head_ref == 'audit/round2-2026-07-23'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Run Python static analyzers
        shell: bash
        run: |
          mkdir -p audit-reports
          python -m pip install --upgrade pip
          pip install bandit ruff
          bandit -r src/clippyme -f json -o audit-reports/bandit.json || true
          ruff check src/clippyme tests \
            --select S,B,ASYNC,DTZ,PTH,RET,SIM,PERF,RUF \
            --output-format=json > audit-reports/ruff.json || true

      - name: Run targeted AST and repository-hygiene scans
        shell: bash
        run: |
          python - <<'PY' > audit-reports/ast-audit.txt
          import ast
          from pathlib import Path

          blocking = {
              'time.sleep', 'subprocess.run', 'subprocess.call',
              'subprocess.check_call', 'subprocess.check_output',
              'subprocess.Popen', 'requests.get', 'requests.post',
              'requests.put', 'requests.delete', 'os.system',
          }
          dangerous = {
              'eval', 'exec', 'pickle.loads', 'yaml.load',
              'tempfile.mktemp', 'tarfile.extractall', 'zipfile.extractall',
          }

          def dotted(node):
              parts = []
              while isinstance(node, ast.Attribute):
                  parts.append(node.attr)
                  node = node.value
              if isinstance(node, ast.Name):
                  parts.append(node.id)
              return '.'.join(reversed(parts))

          for path in sorted(Path('src/clippyme').rglob('*.py')):
              try:
                  tree = ast.parse(path.read_text(encoding='utf-8'))
              except Exception as exc:
                  print(f'{path}: parse error: {exc}')
                  continue
              parents = {}
              for parent in ast.walk(tree):
                  for child in ast.iter_child_nodes(parent):
                      parents[child] = parent
              for node in ast.walk(tree):
                  if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef)):
                      defaults = list(node.args.defaults) + [d for d in node.args.kw_defaults if d]
                      for default in defaults:
                          if isinstance(default, (ast.List, ast.Dict, ast.Set)):
                              print(f'{path}:{node.lineno}: mutable default in {node.name}')
                  if isinstance(node, ast.ExceptHandler) and node.body:
                      if all(isinstance(stmt, ast.Pass) for stmt in node.body):
                          name = dotted(node.type) if node.type else 'bare except'
                          print(f'{path}:{node.lineno}: swallowed exception ({name})')
                  if isinstance(node, ast.Call):
                      name = dotted(node.func)
                      if name in dangerous:
                          print(f'{path}:{node.lineno}: dangerous call {name}')
                      for kw in node.keywords:
                          if kw.arg == 'shell' and isinstance(kw.value, ast.Constant) and kw.value.value is True:
                              print(f'{path}:{node.lineno}: subprocess shell=True')
                      current = node
                      async_parent = None
                      while current in parents:
                          current = parents[current]
                          if isinstance(current, ast.AsyncFunctionDef):
                              async_parent = current
                              break
                          if isinstance(current, ast.FunctionDef):
                              break
                      if async_parent and name in blocking:
                          print(f'{path}:{node.lineno}: blocking {name} in async {async_parent.name}')
          PY
          {
            echo 'Tracked generated/cache files:'
            git ls-files | grep -E '(^|/)(node_modules|__pycache__|dist|coverage)/|\.py[co]$|\.DS_Store$' || true
            echo
            echo 'Potential secret-like assignments in tracked source:'
            git grep -nEI '(api[_-]?key|secret|token|password)[[:space:]]*=[[:space:]]*["'"'][^"'"']{8,}' -- ':!*.lock' ':!package-lock.json' || true
          } > audit-reports/repository-hygiene.txt

      - name: Run full npm advisory and outdated reports
        working-directory: dashboard
        shell: bash
        run: |
          npm audit --package-lock-only --audit-level=low --json > ../audit-reports/npm-full-audit.json || true
          npm outdated --json > ../audit-reports/npm-outdated.json || true

      - name: Upload round-2 diagnostic reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: round2-static-diagnostics
          path: audit-reports/
          if-no-files-found: error
          retention-days: 7
