name: CI

# Host tests, dependency audits and frontend verification run on every push/PR.
# The Docker integration suite also runs on PRs so CV/ML regressions are caught
# before merge rather than only after they reach main.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch-api-contract:
    name: Apply malformed-JSON API contract fix
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/audit/full-hardening-2026-07-23' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/full-hardening-2026-07-23
          fetch-depth: 0
      - name: Patch strict validation while preserving HTTP 400
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/clippyme/api/app.py')
          text = path.read_text()

          old = '''@app.post("/api/live-monitor/stop")
          async def live_monitor_stop(
              request: Request, req: LiveMonitorStopRequest | None = None
          ):
              """Stop one monitor, or all monitors only when the body is truly absent."""
              require_trusted_config_request(request)
              return await live_monitor.stop(req.monitor_id if req else None)
          '''
          new = '''@app.post("/api/live-monitor/stop")
          async def live_monitor_stop(request: Request):
              """Stop one monitor, or all monitors only when the body is truly absent."""
              require_trusted_config_request(request)
              raw = await request.body()
              req = None
              if raw:
                  try:
                      body = await request.json()
                  except Exception:
                      raise HTTPException(status_code=400, detail="Malformed JSON body")
                  try:
                      req = LiveMonitorStopRequest.model_validate(body)
                  except ValidationError as exc:
                      raise HTTPException(
                          status_code=422, detail=exc.errors(include_context=False))
              return await live_monitor.stop(req.monitor_id if req else None)
          '''
          if old not in text:
              raise SystemExit('stop route block not found')
          text = text.replace(old, new, 1)

          old = '''@app.post("/api/live-monitor/{monitor_id}/publishing")
          async def live_monitor_set_publishing(
              monitor_id: str, req: LiveMonitorPublishingRequest, request: Request
          ):
              """Pause/resume auto-publishing with a strict boolean request body."""
              require_trusted_config_request(request)
              enforce_rate_limit(request, "livemonitor", capacity=10, refill_per_sec=10 / 60)
              return {"monitor": live_monitor.set_publishing(monitor_id, req.enabled)}
          '''
          new = '''@app.post("/api/live-monitor/{monitor_id}/publishing")
          async def live_monitor_set_publishing(monitor_id: str, request: Request):
              """Pause/resume auto-publishing with a strict boolean request body."""
              require_trusted_config_request(request)
              enforce_rate_limit(request, "livemonitor", capacity=10, refill_per_sec=10 / 60)
              try:
                  body = await request.json()
              except Exception:
                  raise HTTPException(status_code=400, detail="Malformed JSON body")
              try:
                  req = LiveMonitorPublishingRequest.model_validate(body)
              except ValidationError as exc:
                  raise HTTPException(
                      status_code=422, detail=exc.errors(include_context=False))
              return {"monitor": live_monitor.set_publishing(monitor_id, req.enabled)}
          '''
          if old not in text:
              raise SystemExit('publishing route block not found')
          path.write_text(text.replace(old, new, 1))

          tests = Path('tests/api/test_live_monitor_config_api.py')
          test_text = tests.read_text()
          if 'def test_stop_malformed_json_400()' not in test_text:
              test_text += '''\n\n\ndef test_stop_malformed_json_400():
              fake = _FakeMonitor()
              app_module.live_monitor._monitors["kick:foo"] = fake
              client = TestClient(app_module.app, headers=ORIGIN)

              r = client.post(
                  "/api/live-monitor/stop",
                  content=b"{not json",
                  headers={**ORIGIN, "Content-Type": "application/json"},
              )

              assert r.status_code == 400, r.text
              assert app_module.live_monitor._monitors["kick:foo"] is fake
              '''
              tests.write_text(test_text)
          PY
          python -m compileall -q src tests
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/clippyme/api/app.py tests/api/test_live_monitor_config_api.py
          git commit -m "fix(api): preserve malformed JSON 400 without unsafe coercion"
          git push origin HEAD:audit/full-hardening-2026-07-23

  backend:
    name: Backend (pytest + pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package (editable) + host-test deps + audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[host-tests]"
          pip install pytest pytest-cov pip-audit ruff

      - name: Lint (ruff — bug-class rules)
        run: ruff check src/clippyme tests --select E9,F63,F7,F82

      - name: Run host test suite (excludes integration)
        id: host-tests
        continue-on-error: true
        run: >-
          pytest -m "not integration" -q
          --cov=clippyme --cov-report=term
          --junitxml=pytest-report.xml

      - name: Upload backend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-pytest-report
          path: pytest-report.xml
          if-no-files-found: error
          retention-days: 7

      - name: Dependency vulnerability scan (core pinned tree)
        run: >-
          pip-audit -r requirements.lock --desc
          --ignore-vuln CVE-2025-3000
          --ignore-vuln CVE-2026-24049
          --ignore-vuln PYSEC-2026-1805
          --ignore-vuln PYSEC-2026-2132
          --ignore-vuln PYSEC-2026-3447

      - name: Dependency vulnerability scan (runtime tools)
        run: pip-audit -r requirements-runtime-tools.txt --desc

      - name: Enforce backend test result
        if: steps.host-tests.outcome != 'success'
        run: exit 1

  frontend-audit:
    name: Frontend production dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Generate production audit report
        id: audit
        shell: bash
        run: |
          set +e
          npm audit --package-lock-only --omit=dev --audit-level=high --json > npm-audit.json
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload production audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-production-audit
          path: dashboard/npm-audit.json
          if-no-files-found: error
          retention-days: 7

      - name: Enforce production audit
        if: steps.audit.outputs.exit_code != '0'
        run: |
          node -e "const r=require('./npm-audit.json'); for (const [n,v] of Object.entries(r.vulnerabilities||{})) console.error(n, v.severity, v.via);"
          exit 1

  frontend:
    name: Frontend (test + build + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --coverage

      - name: Build
        run: npm run build

  integration:
    name: Integration (Docker — reframe/pipeline)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image (GHA layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: clippyme-backend:latest
          build-args: |
            GPU_RUNTIME=cpu
            ENABLE_WHISPER_DIARIZE=0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run integration suite in the backend image
        run: docker compose run --rm -u root backend sh -lc "pip install -q pytest && pytest -m integration -q"
