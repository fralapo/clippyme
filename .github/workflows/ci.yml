name: CI

# Host tests, dependency audits and frontend verification run on every push/PR.
# The Docker integration suite also runs on PRs so CV/ML regressions are caught
# before merge rather than only after they reach main.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest + pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package (editable) + host-test deps + audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[host-tests]"
          pip install pytest pytest-cov pip-audit ruff

      # Gate bug-class failures without turning formatting churn into a blocker.
      - name: Lint (ruff — bug-class rules)
        run: ruff check src/clippyme tests --select E9,F63,F7,F82

      - name: Run host test suite (excludes integration)
        run: pytest -m "not integration" -q --cov=clippyme --cov-report=term

      # Blocking audit of the fully pinned core dependency tree. Ignored IDs are
      # documented reachability false positives or fixes blocked by the pinned
      # CV/ML stack; remove them with the corresponding dependency upgrades.
      - name: Dependency vulnerability scan (core pinned tree)
        run: >-
          pip-audit -r requirements.lock --desc
          --ignore-vuln CVE-2025-3000
          --ignore-vuln CVE-2026-24049
          --ignore-vuln PYSEC-2026-1805
          --ignore-vuln PYSEC-2026-2132
          --ignore-vuln PYSEC-2026-3447

      - name: Dependency vulnerability scan (runtime tools)
        run: pip-audit -r requirements-runtime-tools.txt --desc

  frontend:
    name: Frontend (test + build + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --coverage

      - name: Build
        run: npm run build

  integration:
    name: Integration (Docker — reframe/pipeline)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image (GHA layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: clippyme-backend:latest
          build-args: |
            GPU_RUNTIME=cpu
            ENABLE_WHISPER_DIARIZE=0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run integration suite in the backend image
        run: docker compose run --rm -u root backend sh -lc "pip install -q pytest && pytest -m integration -q"
