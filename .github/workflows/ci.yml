name: CI

# Host tests, dependency audits and frontend verification run on every push/PR.
# The Docker integration suite also runs on PRs so CV/ML regressions are caught
# before merge rather than only after they reach main.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-overhaul-finalizer:
    name: Temporary frontend overhaul finalizer
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/runtime-quality-roadmap-20260724
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Apply audited frontend patch
        run: |
          python tools/frontend_overhaul_patch.py
          python tools/frontend_overhaul_fix.py
      - name: Install exact frontend dependencies
        working-directory: dashboard
        run: npm ci --no-audit --no-fund
      - name: Lint frontend
        id: frontend-lint
        continue-on-error: true
        working-directory: dashboard
        run: npm run lint > ../frontend-lint.log 2>&1
      - name: Upload frontend lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-overhaul-lint
          path: frontend-lint.log
          if-no-files-found: error
          retention-days: 2
      - name: Enforce frontend lint
        if: steps.frontend-lint.outcome != 'success'
        run: exit 1
      - name: Test frontend with coverage
        id: frontend-tests
        continue-on-error: true
        working-directory: dashboard
        run: npm test -- --coverage > ../frontend-tests.log 2>&1
      - name: Upload frontend test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-overhaul-tests
          path: frontend-tests.log
          if-no-files-found: error
          retention-days: 2
      - name: Enforce frontend tests
        if: steps.frontend-tests.outcome != 'success'
        run: exit 1
      - name: Build production frontend
        working-directory: dashboard
        run: npm run build
      - name: Audit full dependency tree
        working-directory: dashboard
        run: npm audit --package-lock-only --audit-level=high
      - name: Commit verified frontend overhaul
        run: |
          git rm tools/frontend_overhaul_patch.py tools/frontend_overhaul_fix.py .github/workflows/frontend-overhaul-finalizer.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard
          git commit -m "feat: overhaul frontend resilience accessibility and performance"
          git push origin HEAD:codex/runtime-quality-roadmap-20260724

  backend:
    name: Backend (pytest + pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package (editable) + host-test deps + audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[host-tests]"
          pip install pytest pytest-cov pip-audit ruff bandit

      - name: Lint (ruff — bug-class rules)
        run: ruff check src/clippyme tests --select E9,F63,F7,F82

      - name: Static security scan (Bandit medium/high)
        run: bandit -q -r src/clippyme -ll -ii

      - name: Run host test suite (excludes integration)
        id: host-tests
        continue-on-error: true
        run: >-
          pytest -m "not integration" -q
          --cov=clippyme --cov-report=term
          --junitxml=pytest-report.xml

      - name: Upload backend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-pytest-report
          path: pytest-report.xml
          if-no-files-found: error
          retention-days: 7

      - name: Dependency vulnerability scan (core pinned tree)
        run: >-
          pip-audit -r requirements.lock --desc
          --ignore-vuln CVE-2025-3000
          --ignore-vuln CVE-2026-24049
          --ignore-vuln PYSEC-2026-1805
          --ignore-vuln PYSEC-2026-2132
          --ignore-vuln PYSEC-2026-3447

      - name: Dependency vulnerability scan (runtime tools)
        run: pip-audit -r requirements-runtime-tools.txt --desc

      - name: Enforce backend test result
        if: steps.host-tests.outcome != 'success'
        run: exit 1

  frontend-audit:
    name: Frontend dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Generate full dependency audit report
        id: audit
        shell: bash
        run: |
          set +e
          npm audit --package-lock-only --audit-level=high --json > npm-audit.json
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload full dependency audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-full-audit
          path: dashboard/npm-audit.json
          if-no-files-found: error
          retention-days: 7

      - name: Enforce full dependency audit
        if: steps.audit.outputs.exit_code != '0'
        run: |
          node -e "const r=require('./npm-audit.json'); for (const [n,v] of Object.entries(r.vulnerabilities||{})) console.error(n, v.severity, v.via);"
          exit 1

  frontend:
    name: Frontend (test + build + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --coverage

      - name: Build
        run: npm run build

  integration:
    name: Integration (Docker — reframe/pipeline)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image (GHA layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: clippyme-backend:latest
          build-args: |
            GPU_RUNTIME=cpu
            ENABLE_WHISPER_DIARIZE=0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run integration suite in the backend image
        run: docker compose run --rm -u root backend sh -lc "pip install -q pytest && pytest -m integration -q"
