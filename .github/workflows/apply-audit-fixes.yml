name: Apply coordinated audit fixes

on:
  push:
    branches: ["audit/full-hardening-2026-07-23"]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/full-hardening-2026-07-23
          fetch-depth: 0

      - name: Normalize and apply patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          script = Path('scripts/apply_audit_fixes.py')
          text = script.read_text()
          text = text.replace(
              '        elif self.platform == "twitch" and live:\n'
              '            await self._backfill_from_vod(list(self._missed_windows))\n',
              '',
          )
          text = text.replace(
              '    monitor = LiveMonitorRegistry.__new__(LiveMonitorRegistry)\n',
              '',
          )
          script.write_text(text)
          PY
          python scripts/apply_audit_fixes.py

          python - <<'PY'
          from pathlib import Path

          path = Path('src/clippyme/domain/live_monitor.py')
          text = path.read_text()

          old = '''        if self.cfg.get("catchup") == "live_only":
            return  # ponytail: defence-in-depth — _schedule_backfill never calls us in this mode
        windows = self._missed_windows
'''
          new = '''        if self.cfg.get("catchup") == "live_only":
            return  # defence-in-depth — _schedule_backfill never calls us in this mode
        if not self._backfill_baseline_ready:
            logger.warning(
                "LiveMonitor %s: kick backfill remains pending because the "
                "pre-session VOD baseline is unavailable", self.id)
            self.backfill_pending = len(self._missed_windows)
            self._persist()
            return
        windows = list(self._missed_windows)
'''
          if old in text:
              text = text.replace(old, new, 1)

          old = '''        for t1, t2 in list(windows):
            if self._stop.is_set():
                break
            seg_path = await self._download_vod_range(vod_url, t1, t2)
            if seg_path is not None:
                duration = await asyncio.to_thread(probe_duration, seg_path)
                if should_process_segment(duration):
                    self.segments_captured += 1
                    job_id = await self._submit_segment_job(seg_path)
                    self.current_job_id = job_id
                    await self._await_and_publish(job_id, seg_path)
                else:
                    _safe_remove(seg_path)
            try:
                self._missed_windows.remove((int(t1), int(t2)))
            except ValueError:
                pass
            self.backfill_pending = len(self._missed_windows)
            self._persist()
'''
          new = '''        for t1, t2 in list(windows):
            if self._stop.is_set():
                break
            completed = False
            seg_path = await self._download_vod_range(vod_url, t1, t2)
            if seg_path is not None:
                duration = await asyncio.to_thread(probe_duration, seg_path)
                if should_process_segment(duration):
                    self.segments_captured += 1
                    job_id = await self._submit_segment_job(seg_path)
                    self.current_job_id = job_id
                    await self._await_and_publish(job_id, seg_path)
                    completed = True
                else:
                    _safe_remove(seg_path)
                    completed = True
            if completed:
                try:
                    self._missed_windows.remove((int(t1), int(t2)))
                except ValueError:
                    pass
            self.backfill_pending = len(self._missed_windows)
            self._persist()
'''
          if old in text:
              text = text.replace(old, new, 1)

          path.write_text(text)
          PY

          python -m compileall -q src tests
          git diff --check

      - name: Commit coordinated fixes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No patch needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/clippyme/api/schemas.py src/clippyme/api/app.py \
                  src/clippyme/domain/live_monitor.py \
                  tests/api/test_request_schema_contracts.py \
                  tests/domain/test_live_monitor.py scripts/apply_audit_fixes.py
          git commit -m "fix(monitor): retain failed backfill windows for retry"
          git push origin HEAD:audit/full-hardening-2026-07-23
