name: Frontend lock finalizer

on:
  push:
    branches:
      - codex/runtime-quality-roadmap-20260724
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: frontend-lock-finalizer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/runtime-quality-roadmap-20260724
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Resolve the maintained frontend toolchain
        working-directory: dashboard
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Verify installed lint modules
        working-directory: dashboard
        run: |
          node -e "Promise.all([import('eslint'), import('@eslint/js'), import('@eslint-react/eslint-plugin'), import('axe-core')]).then(() => console.log('lint toolchain resolved'))"
          npm ls eslint @eslint/js @eslint-react/eslint-plugin axe-core --depth=0 || true

      - name: Verify dependency security
        working-directory: dashboard
        run: npm audit --package-lock-only --audit-level=high

      - name: Verify lint, tests and production build
        working-directory: dashboard
        run: |
          npm run lint
          npm test -- --coverage
          npm run build

      - name: Commit the verified lockfile
        run: |
          if git diff --quiet -- dashboard/package.json dashboard/package-lock.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/package.json dashboard/package-lock.json
          git commit -m "chore: finalize secure frontend toolchain"
          git push origin HEAD:codex/runtime-quality-roadmap-20260724
