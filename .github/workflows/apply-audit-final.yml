name: Apply final one-shot audit patch

on:
  push:
    branches: ["audit/full-hardening-2026-07-23"]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/full-hardening-2026-07-23
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Patch backfill retry semantics
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/clippyme/domain/live_monitor.py')
          text = path.read_text()

          old = '''        if self.cfg.get("catchup") == "live_only":
            return  # ponytail: defence-in-depth — _schedule_backfill never calls us in this mode
        windows = self._missed_windows
'''
          new = '''        if self.cfg.get("catchup") == "live_only":
            return  # defence-in-depth — _schedule_backfill never calls us in this mode
        if not self._backfill_baseline_ready:
            logger.warning(
                "LiveMonitor %s: kick backfill remains pending because the "
                "pre-session VOD baseline is unavailable", self.id)
            self.backfill_pending = len(self._missed_windows)
            self._persist()
            return
        windows = list(self._missed_windows)
'''
          if old in text:
              text = text.replace(old, new, 1)

          old = '''        for t1, t2 in list(windows):
            if self._stop.is_set():
                break
            seg_path = await self._download_vod_range(vod_url, t1, t2)
            if seg_path is not None:
                duration = await asyncio.to_thread(probe_duration, seg_path)
                if should_process_segment(duration):
                    self.segments_captured += 1
                    job_id = await self._submit_segment_job(seg_path)
                    self.current_job_id = job_id
                    await self._await_and_publish(job_id, seg_path)
                else:
                    _safe_remove(seg_path)
            try:
                self._missed_windows.remove((int(t1), int(t2)))
            except ValueError:
                pass
            self.backfill_pending = len(self._missed_windows)
            self._persist()
'''
          new = '''        for t1, t2 in list(windows):
            if self._stop.is_set():
                break
            completed = False
            seg_path = await self._download_vod_range(vod_url, t1, t2)
            if seg_path is not None:
                duration = await asyncio.to_thread(probe_duration, seg_path)
                if should_process_segment(duration):
                    self.segments_captured += 1
                    job_id = await self._submit_segment_job(seg_path)
                    self.current_job_id = job_id
                    await self._await_and_publish(job_id, seg_path)
                    completed = True
                else:
                    _safe_remove(seg_path)
                    completed = True
            if completed:
                try:
                    self._missed_windows.remove((int(t1), int(t2)))
                except ValueError:
                    pass
            self.backfill_pending = len(self._missed_windows)
            self._persist()
'''
          if old in text:
              text = text.replace(old, new, 1)
          path.write_text(text)

          tests = Path('tests/domain/test_live_monitor.py')
          tests.write_text(tests.read_text().replace(
              '    monitor = LiveMonitorRegistry.__new__(LiveMonitorRegistry)\n', '',
          ))
          PY

      - name: Upgrade frontend dependencies
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          for name in ('dashboard/Dockerfile', 'dashboard/Dockerfile.prod'):
              path = Path(name)
              text = path.read_text().replace('node:20-alpine', 'node:22-alpine')
              if name.endswith('/Dockerfile'):
                  text = text.replace('RUN npm install\n', 'RUN npm ci\n')
              path.write_text(text)

          ci = Path('.github/workflows/ci.yml')
          ci.write_text(ci.read_text().replace('node-version: "20"', 'node-version: "22"'))

          config = Path('dashboard/vite.config.js')
          text = config.read_text()
          if "from 'node:url'" not in text:
              text = text.replace(
                  "import path from 'path'\n",
                  "import path from 'node:path'\nimport { fileURLToPath } from 'node:url'\n",
              )
              text = text.replace(
                  '// Content-Security-Policy injected',
                  'const __dirname = path.dirname(fileURLToPath(import.meta.url))\n\n'
                  '// Content-Security-Policy injected',
              )
          config.write_text(text)
          PY

          cd dashboard
          npm install --package-lock-only --save-dev vite@8.1.5 @vitejs/plugin-react@6.0.4
          npm audit --package-lock-only --omit=dev --audit-level=high
          cd ..

      - name: Verify and commit
        shell: bash
        run: |
          python -m compileall -q src tests
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/clippyme/domain/live_monitor.py tests/domain/test_live_monitor.py \
                  dashboard/package.json dashboard/package-lock.json \
                  dashboard/Dockerfile dashboard/Dockerfile.prod dashboard/vite.config.js \
                  .github/workflows/ci.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "fix(audit): finish backfill durability and upgrade Vite"
          git push origin HEAD:audit/full-hardening-2026-07-23
