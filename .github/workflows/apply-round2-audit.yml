name: Apply round-two audit payload

on:
  push:
    branches: ["audit/round2-2026-07-23"]
    paths: [".github/workflows/apply-round2-audit.yml"]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: apply-round2-audit
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decode and apply audited source tree
        shell: bash
        run: |
          set -euo pipefail
          cat .audit-payload/round2.chunk{00..08} | base64 --decode > /tmp/round2.tar.xz
          tar -tJf /tmp/round2.tar.xz >/dev/null
          tar -xJf /tmp/round2.tar.xz -C .
          git fetch origin main --depth=1
          git show FETCH_HEAD:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -rf .audit-payload
          rm -f .github/workflows/source-snapshot.yml
          rm -f .github/workflows/apply-round2-audit.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(audit): apply round-two hardening"
          git push origin HEAD:audit/round2-2026-07-23
