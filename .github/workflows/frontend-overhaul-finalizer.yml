name: Frontend overhaul finalizer

on:
  push:
    branches: ["codex/runtime-quality-roadmap-20260724"]
    paths:
      - "tools/frontend_overhaul_patch.py"
      - ".github/workflows/frontend-overhaul-finalizer.yml"

permissions:
  contents: write

concurrency:
  group: frontend-overhaul-finalizer
  cancel-in-progress: false

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/runtime-quality-roadmap-20260724
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Apply audited frontend patch
        run: python tools/frontend_overhaul_patch.py
      - name: Install exact frontend dependencies
        working-directory: dashboard
        run: npm ci --no-audit --no-fund
      - name: Lint frontend
        working-directory: dashboard
        run: npm run lint
      - name: Test frontend with coverage
        working-directory: dashboard
        run: npm test -- --coverage
      - name: Build production frontend
        working-directory: dashboard
        run: npm run build
      - name: Audit full dependency tree
        working-directory: dashboard
        run: npm audit --package-lock-only --audit-level=high
      - name: Commit verified frontend overhaul
        run: |
          git rm tools/frontend_overhaul_patch.py .github/workflows/frontend-overhaul-finalizer.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard
          git commit -m "feat: overhaul frontend resilience accessibility and performance"
          git push origin HEAD:codex/runtime-quality-roadmap-20260724
